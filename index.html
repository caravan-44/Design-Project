    <!--Chatgpt helped a little with some issues in the java, as it was difficult to figure out, there was a problem that needed to be fixed, couldn't find answer anywhere else, but this is so the fish flaps around.-->
    <script>
const fish = document.getElementById("fish");
const guts = document.getElementById("guts");

fish.addEventListener("click", () => {

    const rect = fish.getBoundingClientRect();

    guts.style.display = "block";
    guts.innerHTML = "";

    guts.style.left = rect.left + "px";
    guts.style.top = rect.top + "px";

    for(let i = 0; i < 25; i++){

        const chunk = document.createElement("div");

        chunk.classList.add("chunk");

        chunk.style.setProperty(
            "--x",
            Math.random() * 400 - 200
        );

        chunk.style.setProperty(
            "--y",
            Math.random() * 400 - 200
        );

        guts.appendChild(chunk);

        setTimeout(() => {
            chunk.remove();
        }, 1000);
    }

    fish.style.display = "none";

    setTimeout(() => {

        fish.style.animation = "none";

        fish.offsetHeight;

        fish.style.display = "block";

        fish.style.animation =
            "swim 10s linear infinite, flop 0.3s ease-in-out infinite alternate";

    }, 3000);

});
</script>
